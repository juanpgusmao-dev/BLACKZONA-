  window.importar = async function() {
    const log = document.getElementById('log');
    log.style.display = 'block';
    log.innerHTML = '⏳ Iniciando importação...<br>';
    let ok = 0, erro = 0;
    for (const p of produtos) {
      try {
        await addDoc(collection(db, 'produtos'), { ...p, criadoEm: serverTimestamp() });
        log.innerHTML += `✅ ${p.nome}<br>`;
        ok++;
      } catch(e) {
        log.innerHTML += `❌ ${p.nome} — ${e.message}<br>`;
        erro++;
      }
      log.scrollTop = log.scrollHeight;
    }
    log.innerHTML += `<br><strong>✅ ${ok} importados | ❌ ${erro} erros</strong>`;
  };
