<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLACKZONA — Painel Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    body { background:#0a0a0a; color:#f0ece4; font-family:'Space Mono',monospace; }
    input, select, textarea { background:#18181b; border:1px solid #3f3f46; color:#f0ece4; border-radius:8px; padding:10px 14px; width:100%; margin-bottom:10px; font-family:'Space Mono',monospace; font-size:14px; }
    input:focus, select:focus, textarea:focus { outline:none; border-color:#C9A84C; }
    .btn-gold { background:#C9A84C; color:#000; font-weight:700; padding:12px 24px; border-radius:8px; cursor:pointer; border:none; transition:filter .2s; font-family:'Space Mono',monospace; }
    .btn-gold:hover { filter:brightness(1.15); }
    .btn-outline { background:transparent; color:#C9A84C; border:1px solid #C9A84C; font-weight:700; padding:10px 20px; border-radius:8px; cursor:pointer; transition:all .2s; font-family:'Space Mono',monospace; }
    .btn-outline:hover { background:#C9A84C; color:#000; }
    .tab-btn { background:transparent; color:#a1a1aa; border-bottom:2px solid transparent; padding:10px 20px; cursor:pointer; font-family:'Space Mono',monospace; font-weight:700; transition:all .2s; border-top:none; border-left:none; border-right:none; }
    .tab-btn.active { color:#C9A84C; border-bottom-color:#C9A84C; }
    .toast { position:fixed; bottom:24px; right:24px; background:#C9A84C; color:#000; padding:12px 24px; border-radius:8px; font-weight:700; z-index:9999; display:none; font-family:'Space Mono',monospace; }
    #loading-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); display:none; align-items:center; justify-content:center; z-index:9998; flex-direction:column; gap:12px; }
  </style>
</head>
<body class="min-h-screen p-4">

<div id="toast" class="toast"></div>
<div id="loading-overlay" style="display:none;">
  <div style="color:#C9A84C;font-size:3rem;">⏳</div>
  <p style="color:#C9A84C;font-weight:700;">Salvando...</p>
</div>

<!-- LOGIN -->
<div id="login-section" class="min-h-screen flex items-center justify-center">
  <div style="width:100%;max-width:380px;">
    <h1 style="font-family:'Bebas Neue',sans-serif;font-size:3rem;text-align:center;color:#C9A84C;margin-bottom:8px;letter-spacing:2px;">BLACKZONA</h1>
    <p style="text-align:center;color:#a1a1aa;font-size:.75rem;margin-bottom:2rem;letter-spacing:4px;">PAINEL ADMINISTRATIVO</p>
    <div style="background:#18181b;border-radius:16px;padding:2rem;border:1px solid #3f3f46;">
      <input id="email" type="email" placeholder="E-mail" />
      <input id="senha" type="password" placeholder="Senha" />
      <button id="btn-entrar" class="btn-gold" style="width:100%;margin-top:4px;font-size:1rem;letter-spacing:2px;">ENTRAR</button>
      <p id="erro-login" style="color:#f87171;font-size:.8rem;text-align:center;margin-top:12px;display:none;"></p>
    </div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel" style="display:none;max-width:900px;margin:0 auto;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid #3f3f46;">
    <h1 style="font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:#C9A84C;letter-spacing:2px;">BLACKZONA ADMIN</h1>
    <button class="btn-outline" id="btn-logout">SAIR</button>
  </div>

  <div style="display:flex;border-bottom:1px solid #3f3f46;margin-bottom:2rem;">
    <button class="tab-btn active" id="tab-add">+ NOVO PRODUTO</button>
    <button class="tab-btn" id="tab-list">GERENCIAR PRODUTOS</button>
  </div>

  <!-- TAB ADICIONAR -->
  <div id="content-add">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div>
        <label style="font-size:.7rem;color:#a1a1aa;letter-spacing:2px;display:block;margin-bottom:4px;">NOME DO PRODUTO</label>
        <input id="p-nome" type="text" placeholder="Ex: Mochila Quilombo" />
      </div>
      <div>
        <label style="font-size:.7rem;color:#a1a1aa;letter-spacing:2px;display:block;margin-bottom:4px;">CATEGORIA</label>
        <select id="p-categoria">
          <option value="candaces">Bolsas Candaces</option>
          <option value="mochilas">Mochilas</option>
          <option value="cartucheiras">Cartucheiras</option>
          <option value="adornos">Adornos & Brincos</option>
          <option value="criacao">Bolsa Criação</option>
          <option value="pochetes">Pochetes</option>
        </select>
      </div>
      <div>
        <label style="font-size:.7rem;color:#a1a1aa;letter-spacing:2px;display:block;margin-bottom:4px;">TAMANHO</label>
        <input id="p-tamanho" type="text" placeholder="Ex: M, G, Único" />
      </div>
      <div>
        <label style="font-size:.7rem;color:#a1a1aa;letter-spacing:2px;display:block;margin-bottom:4px;">PREÇO (R$) — vazio = Sob Consulta</label>
        <input id="p-preco" type="text" placeholder="Ex: 145.00" />
      </div>
    </div>
    <div style="margin-top:4px;">
      <label style="font-size:.7rem;color:#a1a1aa;letter-spacing:2px;display:block;margin-bottom:4px;">DESCRIÇÃO</label>
      <textarea id="p-descricao" rows="3" placeholder="Descrição do produto..."></textarea>
    </div>
    <div>
      <label style="font-size:.7rem;color:#a1a1aa;letter-spacing:2px;display:block;margin-bottom:4px;">STATUS</label>
      <select id="p-status">
        <option value="disponivel">Disponível</option>
        <option value="encomenda">Sob Encomenda</option>
        <option value="esgotado">Esgotado</option>
      </select>
    </div>
    <div style="display:flex;gap:2rem;margin:16px 0;">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.85rem;">
        <input id="p-autoral" type="checkbox" style="width:18px;height:18px;margin:0;accent-color:#C9A84C;" /> Peça Autoral
      </label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.85rem;">
        <input id="p-destaque" type="checkbox" style="width:18px;height:18px;margin:0;accent-color:#C9A84C;" /> Destaque na Home
      </label>
    </div>
    <div>
      <label style="font-size:.7rem;color:#a1a1aa;letter-spacing:2px;display:block;margin-bottom:4px;">FOTOS (até 5 imagens)</label>
      <input id="p-fotos" type="file" multiple accept="image/*" style="background:transparent;border:1px dashed #3f3f46;cursor:pointer;" />
      <div id="foto-preview" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;"></div>
    </div>
    <button id="btn-salvar" class="btn-gold" style="margin-top:20px;width:100%;font-size:1rem;letter-spacing:2px;">SALVAR PRODUTO</button>
  </div>

  <!-- TAB GERENCIAR -->
  <div id="content-list" style="display:none;">
    <div id="lista-produtos" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;">
      <p style="color:#a1a1aa;">Carregando produtos...</p>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCWteZvOtgY4EPiPsLcUihEAdyIhcWOs-M",
    authDomain: "blackzona-739bb.firebaseapp.com",
    projectId: "blackzona-739bb",
    storageBucket: "blackzona-739bb.firebasestorage.app",
    messagingSenderId: "674389629970",
    appId: "1:674389629970:web:380e5b143eb201a7490ccb"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  // AUTH STATE
  onAuthStateChanged(auth, user => {
    if (user) {
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
    } else {
      document.getElementById('login-section').style.display = 'flex';
      document.getElementById('admin-panel').style.display = 'none';
    }
  });

  // LOGIN
  document.getElementById('btn-entrar').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const erro = document.getElementById('erro-login');
    erro.style.display = 'none';
    if (!email || !senha) {
      erro.textContent = 'Preencha e-mail e senha.';
      erro.style.display = 'block';
      return;
    }
    try {
      await signInWithEmailAndPassword(auth, email, senha);
    } catch(e) {
      erro.textContent = 'E-mail ou senha incorretos.';
      erro.style.display = 'block';
    }
  });

  // LOGIN COM ENTER
  document.getElementById('senha').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-entrar').click();
  });

  // LOGOUT
  document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

  // TABS
  document.getElementById('tab-add').addEventListener('click', () => {
    document.getElementById('content-add').style.display = 'block';
    document.getElementById('content-list').style.display = 'none';
    document.getElementById('tab-add').classList.add('active');
    document.getElementById('tab-list').classList.remove('active');
  });
  document.getElementById('tab-list').addEventListener('click', () => {
    document.getElementById('content-add').style.display = 'none';
    document.getElementById('content-list').style.display = 'block';
    document.getElementById('tab-add').classList.remove('active');
    document.getElementById('tab-list').classList.add('active');
    carregarLista();
  });

  // PREVIEW FOTOS
  document.getElementById('p-fotos').addEventListener('change', function() {
    const preview = document.getElementById('foto-preview');
    preview.innerHTML = '';
    Array.from(this.files).slice(0,5).forEach(file => {
      const img = document.createElement('img');
      img.src = URL.createObjectURL(file);
      img.style.cssText = 'width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid #3f3f46;';
      preview.appendChild(img);
    });
  });

  // TOAST
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }

  // LOADING
  function setLoading(on) {
    document.getElementById('loading-overlay').style.display = on ? 'flex' : 'none';
  }

  // SALVAR PRODUTO
  document.getElementById('btn-salvar').addEventListener('click', async () => {
    const nome = document.getElementById('p-nome').value.trim();
    if (!nome) { toast('⚠️ Digite o nome do produto!'); return; }
    setLoading(true);
    try {
      const files = document.getElementById('p-fotos').files;
      const fotosURL = [];
      for (let i = 0; i < Math.min(files.length, 5); i++) {
        const storageRef = ref(storage, 'produtos/' + Date.now() + '_' + files[i].name);
        await uploadBytes(storageRef, files[i]);
        const url = await getDownloadURL(storageRef);
        fotosURL.push(url);
      }
      const precoRaw = document.getElementById('p-preco').value.trim();
      await addDoc(collection(db, 'produtos'), {
        nome,
        categoria: document.getElementById('p-categoria').value,
        tamanho: document.getElementById('p-tamanho').value.trim() || 'Único',
        preco: precoRaw ? parseFloat(precoRaw) : null,
        sob_consulta: !precoRaw,
        descricao: document.getElementById('p-descricao').value.trim(),
        status: document.getElementById('p-status').value,
        autoral: document.getElementById('p-autoral').checked,
        destaque: document.getElementById('p-destaque').checked,
        fotos: fotosURL,
        criadoEm: serverTimestamp()
      });
      toast('✅ Produto salvo com sucesso!');
      // limpar form
      ['p-nome','p-tamanho','p-preco','p-descricao'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('p-autoral').checked = false;
      document.getElementById('p-destaque').checked = false;
      document.getElementById('foto-preview').innerHTML = '';
      document.getElementById('p-fotos').value = '';
    } catch(e) {
      console.error(e);
      toast('❌ Erro ao salvar: ' + e.message);
    }
    setLoading(false);
  });

  // CARREGAR LISTA
  async function carregarLista() {
    const container = document.getElementById('lista-produtos');
    container.innerHTML = '<p style="color:#a1a1aa;">Carregando...</p>';
    try {
      const snap = await getDocs(collection(db, 'produtos'));
      if (snap.empty) { container.innerHTML = '<p style="color:#a1a1aa;">Nenhum produto cadastrado ainda.</p>'; return; }
      container.innerHTML = '';
      snap.forEach(d => {
        const p = d.data();
        const card = document.createElement('div');
        card.style.cssText = 'background:#18181b;border:1px solid #3f3f46;border-radius:12px;padding:16px;';
        card.innerHTML = `
          ${p.fotos?.[0] ? `<img src="${p.fotos[0]}" style="width:100%;height:160px;object-fit:cover;border-radius:8px;margin-bottom:12px;" />` : ''}
          <p style="font-weight:700;color:#C9A84C;margin-bottom:4px;">${p.nome}</p>
          <p style="font-size:.75rem;color:#a1a1aa;margin-bottom:4px;">${p.categoria} • ${p.tamanho || 'Único'}</p>
          <p style="font-size:.85rem;margin-bottom:12px;">${p.sob_consulta ? 'Sob Consulta' : 'R$ ' + Number(p.preco).toFixed(2)}</p>
          <button onclick="window._deletar('${d.id}')" style="background:#ef4444;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-family:'Space Mono',monospace;font-size:.8rem;width:100%;">🗑 EXCLUIR</button>
        `;
        container.appendChild(card);
      });
    } catch(e) {
      container.innerHTML = '<p style="color:#f87171;">Erro ao carregar: ' + e.message + '</p>';
    }
  }

  window._deletar = async function(id) {
    if (!confirm('Excluir este produto?')) return;
    try {
      await deleteDoc(doc(db, 'produtos', id));
      toast('🗑 Produto excluído!');
      carregarLista();
    } catch(e) {
      toast('❌ Erro: ' + e.message);
    }
  };
</script>
</body>
</html>
